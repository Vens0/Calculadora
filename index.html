<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<script src="prog.js"></script>
    
    <div class="gr">
        <h2 class="txt">Calculadora Simples</h2>
        <div id="visor"></div>



        <div>
            <div class="flex">

                <button class="bloco" onclick ="input('1')"> 
                    <h2 class="num">1</h2>
                </button>

                <button class="bloco"  onclick ="input('2')">
                    <h2 class="num">2</h2>
                </button>

                <button class="bloco"  onclick ="input('3')">
                    <h2 class="num">3</h2>
                </button>

                <button class="bloco">
                    <h2 class="num">+</h2>
                </button>

            </div>


            <div class="flex">
                <button class="bloco"  onclick ="input('4')">
                    <h2 class="num">4</h2>
                </button>

                <button class="bloco"  onclick ="input('5')">
                    <h2 class="num">5</h2>
                </button>

                <button class="bloco"  onclick ="input('6')">
                    <h2 class="num">6</h2>
                </button>

                <button class="bloco">
                    <h2 class="num">-</h2>
                </button>
            </div>


            <div class="flex">
                <button class="bloco"  onclick ="input('7')">
                    <h2 class="num">7</h2>
                </button>

                <button class="bloco"  onclick ="input('8')">
                    <h2 class="num">8</h2>
                </button>

                <button class="bloco"  onclick ="input('9')">
                    <h2 class="num">9</h2>
                </button>

                <button class="bloco">
                    <h2 class="num">x</h2>
                </button>

            </div>


            <div>
                <div class="flex">
                    <button class="bloco">
                    <h2 class="num">=</h2>
                </button>

                    <button class="bloco" onclick ="input('0')">
                    <h2 class="num">0</h2>
                </button>

                    <button class="bloco">
                    <h2 class="num">C</h2>
                </button>

                    <button class="bloco">
                    <h2 class="num">/</h2>
                </button>

                </div>
            </div>

        </div>



    </div>

</body>

</html>
